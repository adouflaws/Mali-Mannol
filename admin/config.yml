backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: fr

collections:
  - name: "site"
    label: "Contenu du site"
    files:

      - name: "coordonnees"
        label: "Coordonnees et contact"
        file: "data/contenu.json"
        format: json
        fields:
          - label: "Telephone"
            name: "phone"
            widget: "string"
            hint: "Ex : +223 66 73 96 12"
          - label: "Numero WhatsApp"
            name: "whatsapp"
            widget: "string"
            hint: "Sans le +, ex : 22366739612"
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "Adresse"
            name: "adresse"
            widget: "string"
            hint: "Ex : Badalabougou, Bamako"
          - label: "Horaires"
            name: "horaires"
            widget: "string"
            hint: "Ex : Lundi - Samedi, 8h - 18h"
          - label: "Titre page accueil"
            name: "hero_titre"
            widget: "string"
          - label: "Description page accueil"
            name: "hero_description"
            widget: "text"
          - label: "Description a propos (footer)"
            name: "apropos_court"
            widget: "string"

      - name: "images"
        label: "Images du site"
        file: "data/images.json"
        format: json
        fields:
          - label: "Image Hero (page d'accueil)"
            name: "hero"
            widget: "image"
            required: false
            hint: "Grande image principale de la page d'accueil"
          - label: "Photo A propos / Equipe"
            name: "about"
            widget: "image"
            required: false
            hint: "Photo de l'equipe ou du local"
          - label: "Image Service 1"
            name: "service_1"
            widget: "image"
            required: false
          - label: "Image Service 2"
            name: "service_2"
            widget: "image"
            required: false
          - label: "Image Service 3"
            name: "service_3"
            widget: "image"
            required: false
          - label: "Image Service 4"
            name: "service_4"
            widget: "image"
            required: false
          - label: "Image Service 5"
            name: "service_5"
            widget: "image"
            required: false
          - label: "Image Service 6"
            name: "service_6"
            widget: "image"
            required: false
          - label: "Image Produit 1"
            name: "produit_1"
            widget: "image"
            required: false
          - label: "Image Produit 2"
            name: "produit_2"
            widget: "image"
            required: false
          - label: "Image Produit 3"
            name: "produit_3"
            widget: "image"
            required: false
          - label: "Image Produit 4"
            name: "produit_4"
            widget: "image"
            required: false
          - label: "Image Produit 5"
            name: "produit_5"
            widget: "image"
            required: false
          - label: "Image Produit 6"
            name: "produit_6"
            widget: "image"
            required: false

  - name: "services"
    label: "Textes des services"
    files:
      - name: "services"
        label: "Contenu des 6 services"
        file: "data/services.json"
        format: json
        fields:
          - label: "Service 01 - Vente en gros"
            name: "svc1"
            widget: "object"
            fields:
              - label: "Titre"
                name: "titre"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Points (un par ligne)"
                name: "points"
                widget: "text"
                hint: "Chaque ligne devient un point dans la liste a puces"
          - label: "Service 02 - Vente au detail"
            name: "svc2"
            widget: "object"
            fields:
              - label: "Titre"
                name: "titre"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Points (un par ligne)"
                name: "points"
                widget: "text"
                hint: "Chaque ligne devient un point dans la liste a puces"
          - label: "Service 03 - Conseil technique"
            name: "svc3"
            widget: "object"
            fields:
              - label: "Titre"
                name: "titre"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Points (un par ligne)"
                name: "points"
                widget: "text"
                hint: "Chaque ligne devient un point dans la liste a puces"
          - label: "Service 04 - Livraison"
            name: "svc4"
            widget: "object"
            fields:
              - label: "Titre"
                name: "titre"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Points (un par ligne)"
                name: "points"
                widget: "text"
                hint: "Chaque ligne devient un point dans la liste a puces"
          - label: "Service 05 - Contrat flotte"
            name: "svc5"
            widget: "object"
            fields:
              - label: "Titre"
                name: "titre"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Points (un par ligne)"
                name: "points"
                widget: "text"
                hint: "Chaque ligne devient un point dans la liste a puces"
          - label: "Service 06 - Partenariat atelier"
            name: "svc6"
            widget: "object"
            fields:
              - label: "Titre"
                name: "titre"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Points (un par ligne)"
                name: "points"
                widget: "text"
                hint: "Chaque ligne devient un point dans la liste a puces"

  - name: "catalogue"
    label: "Catalogue produits"
    files:
      - name: "produits"
        label: "Modifier les produits"
        file: "data/produits.json"
        format: json
        fields:
          - label: "Produits"
            name: "produits"
            widget: "list"
            fields:
              - label: "Categorie"
                name: "categorie"
                widget: "select"
                options:
                  - label: "Huiles moteur"
                    value: "moteur"
                  - label: "Transmission"
                    value: "trans"
                  - label: "Poids lourds et engins"
                    value: "pl"
                  - label: "Moto"
                    value: "moto"
                  - label: "Fluides techniques"
                    value: "fluides"
                  - label: "Additifs"
                    value: "additifs"
                  - label: "Graisses"
                    value: "graisses"
                  - label: "Entretien et filtres"
                    value: "carcare"
              - label: "Nom du produit"
                name: "nom"
                widget: "string"
              - label: "Badge (ex: Synthetique, Diesel...)"
                name: "badge"
                widget: "string"
              - label: "Grade / Description"
                name: "grade"
                widget: "string"
              - label: "Normes (separees par des virgules)"
                name: "normes"
                widget: "string"
              - label: "Image du produit"
                name: "image"
                widget: "image"
                required: false
                hint: "Cliquez pour uploader une photo depuis votre ordinateur"
